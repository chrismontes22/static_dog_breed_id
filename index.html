<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Breed Identifier</title>
  <style>
    /* ── Variables ─────────────────────────────────────── */
    :root {
      --amber:    #E8A44A;
      --amber-dk: #C8862E;
      --dark:     #1A1814;
      --mid:      #3D3A34;
      --muted:    #7A7670;
      --bg:       #F7F5F0;
      --card:     #FFFFFF;
      --border:   #E4E0D8;
      --radius:   14px;
      --shadow:   0 4px 24px rgba(0,0,0,.08);
      --shadow-lg:0 8px 40px rgba(0,0,0,.13);
      --trans:    .22s ease;
    }

    /* ── Reset & base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Layout ────────────────────────────────────────── */
    header {
      width: 100%; background: var(--dark);
      padding: 1.25rem 2rem;
      display: flex; align-items: center; gap: .75rem;
    }
    header span { font-size: 1.75rem; }
    header h1 { color: var(--amber); font-size: 1.25rem; font-weight: 700; letter-spacing: -.3px; }
    header p  { color: var(--muted); font-size: .8rem; margin-top: 1px; }

    main {
      width: 100%; max-width: 620px;
      padding: 2.5rem 1.25rem 4rem;
      display: flex; flex-direction: column; gap: 2rem;
    }

    /* ── Cards ─────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow: var(--shadow);
      transition: opacity var(--trans);
    }
    .card.hidden { display: none; }
    .card h2 {
      font-size: .7rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 1.1rem;
    }

    /* ── Upload zone ────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--trans), background var(--trans);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--amber);
      background: #FEF8EE;
    }
    .upload-zone input { display: none; }
    .upload-zone .icon { font-size: 2.5rem; margin-bottom: .6rem; }
    .upload-zone p { color: var(--muted); font-size: .9rem; }
    .upload-zone strong { color: var(--amber); }

    /* ── Preview ────────────────────────────────────────── */
    #preview-wrap {
      position: relative; text-align: center; margin-top: 1.25rem;
      display: none;
    }
    #preview-wrap img {
      width: 100%; max-height: 320px; object-fit: cover;
      border-radius: 10px; display: block;
    }
    #preview-wrap button.clear-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(26,24,20,.65); color: #fff;
      border: none; border-radius: 50%; width: 28px; height: 28px;
      font-size: 1rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }

    /* ── Primary button ─────────────────────────────────── */
    .btn {
      width: 100%; padding: .85rem 1rem;
      background: var(--amber); color: var(--dark);
      border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: background var(--trans), transform var(--trans);
      margin-top: 1.25rem;
    }
    .btn:hover:not(:disabled) { background: var(--amber-dk); }
    .btn:active:not(:disabled) { transform: scale(.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2.5px solid rgba(26,24,20,.2);
      border-top-color: var(--dark);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Prediction cards ───────────────────────────────── */
    .pred-list { display: flex; flex-direction: column; gap: .75rem; }
    .pred-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.1rem;
      border: 2px solid var(--border);
      border-radius: 10px; cursor: pointer;
      transition: border-color var(--trans), background var(--trans);
    }
    .pred-item:hover { border-color: var(--amber); background: #FEF8EE; }
    .pred-item.selected { border-color: var(--amber); background: #FEF8EE; }
    .pred-item input[type=radio] { display: none; }
    .pred-rank {
      min-width: 28px; height: 28px;
      background: var(--bg); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700; color: var(--muted);
    }
    .pred-item.selected .pred-rank { background: var(--amber); color: var(--dark); }
    .pred-name { flex: 1; font-weight: 600; font-size: 1rem; }
    .pred-pct {
      font-size: .85rem; font-weight: 700; color: var(--amber);
    }
    .pred-bar-wrap {
      width: 100%; height: 4px; background: var(--border);
      border-radius: 99px; margin-top: 4px; overflow: hidden;
    }
    .pred-bar { height: 100%; background: var(--amber); border-radius: 99px; }
    .pred-label-wrap { flex: 1; }

    /* ── Question area ──────────────────────────────────── */
    .qa-breed-label {
      font-size: 1.2rem; font-weight: 700; color: var(--dark);
      margin-bottom: .25rem;
    }
    .qa-sub { font-size: .85rem; color: var(--muted); margin-bottom: 1.1rem; }
    .qa-input-wrap { position: relative; }
    textarea {
      width: 100%; min-height: 88px;
      padding: .9rem 1rem; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 1rem; resize: vertical;
      font-family: inherit; color: var(--dark); background: var(--bg);
      transition: border-color var(--trans);
      outline: none;
    }
    textarea:focus { border-color: var(--amber); background: #fff; }

    /* ── Answer bubble ──────────────────────────────────── */
    .answer-box {
      background: var(--bg); border-left: 4px solid var(--amber);
      border-radius: 0 10px 10px 0;
      padding: 1.1rem 1.2rem;
      font-size: .97rem; line-height: 1.6; color: var(--mid);
    }
    .answer-actions {
      display: flex; gap: .75rem; margin-top: 1rem;
    }
    .btn-ghost {
      flex: 1; padding: .65rem;
      background: transparent; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .85rem; font-weight: 600;
      cursor: pointer; color: var(--mid);
      transition: border-color var(--trans), color var(--trans);
    }
    .btn-ghost:hover { border-color: var(--amber); color: var(--dark); }

    /* ── Error ───────────────────────────────────────────── */
    .error-msg {
      background: #FFF1F0; border: 1px solid #FFC9C4;
      color: #C0392B; border-radius: 8px;
      padding: .8rem 1rem; font-size: .88rem; margin-top: .75rem;
    }
  </style>
</head>
<body>

<header>
  <span>🐕</span>
  <div>
    <h1>Dog Breed Identifier</h1>
    <p>Upload a photo · identify the breed · ask anything</p>
  </div>
</header>

<main>

  <!-- Step 1 — Upload -->
  <div class="card" id="card-upload">
    <h2>Step 1 — Upload a photo</h2>

    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <div class="icon">📷</div>
      <p>Drag &amp; drop a photo here, or <strong>click to browse</strong></p>
    </div>

    <div id="preview-wrap">
      <img id="preview-img" src="" alt="Dog preview" />
      <button class="clear-btn" id="clear-btn" title="Remove image">✕</button>
    </div>

    <div id="upload-error"></div>
    <button class="btn" id="classify-btn" disabled>Identify Breed</button>
  </div>

  <!-- Step 2 — Predictions -->
  <div class="card hidden" id="card-results">
    <h2>Step 2 — Select the correct breed</h2>
    <div class="pred-list" id="pred-list"></div>
    <div id="results-error"></div>
    <button class="btn" id="select-btn" disabled>Ask a Question →</button>
  </div>

  <!-- Step 3 — Ask -->
  <div class="card hidden" id="card-ask">
    <h2>Step 3 — Ask anything</h2>
    <div class="qa-breed-label" id="qa-breed-name"></div>
    <p class="qa-sub">What would you like to know about this breed?</p>
    <div class="qa-input-wrap">
      <textarea id="question-input" placeholder="e.g. How much exercise does this breed need?"></textarea>
    </div>
    <div id="ask-error"></div>
    <button class="btn" id="ask-btn" disabled>Ask</button>
  </div>

  <!-- Step 4 — Answer -->
  <div class="card hidden" id="card-answer">
    <h2>Answer</h2>
    <div class="answer-box" id="answer-text"></div>
    <div class="answer-actions">
      <button class="btn-ghost" id="ask-another-btn">Ask another question</button>
      <button class="btn-ghost" id="start-over-btn">Start over</button>
    </div>
  </div>

</main>

<script>
  /* ── CONFIG — update these after deploying your two APIs ──────────────── */
  const CLASSIFIER_URL = "https://your-classifier.onrender.com";   // Render URL
  const RAG_URL        = "https://your-rag.koyeb.app";             // Koyeb URL
  /* ─────────────────────────────────────────────────────────────────────── */

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const dropZone      = document.getElementById("drop-zone");
  const fileInput     = document.getElementById("file-input");
  const previewWrap   = document.getElementById("preview-wrap");
  const previewImg    = document.getElementById("preview-img");
  const clearBtn      = document.getElementById("clear-btn");
  const classifyBtn   = document.getElementById("classify-btn");
  const uploadError   = document.getElementById("upload-error");

  const cardResults   = document.getElementById("card-results");
  const predList      = document.getElementById("pred-list");
  const selectBtn     = document.getElementById("select-btn");
  const resultsError  = document.getElementById("results-error");

  const cardAsk       = document.getElementById("card-ask");
  const qaBreedName   = document.getElementById("qa-breed-name");
  const questionInput = document.getElementById("question-input");
  const askBtn        = document.getElementById("ask-btn");
  const askError      = document.getElementById("ask-error");

  const cardAnswer    = document.getElementById("card-answer");
  const answerText    = document.getElementById("answer-text");
  const askAnotherBtn = document.getElementById("ask-another-btn");
  const startOverBtn  = document.getElementById("start-over-btn");

  // ── State ─────────────────────────────────────────────────────────────────
  let selectedFile   = null;
  let selectedBreed  = null;  // { breed, display_name }

  // ── File selection ────────────────────────────────────────────────────────
  dropZone.addEventListener("click", () => fileInput.click());

  dropZone.addEventListener("dragover", e => {
    e.preventDefault(); dropZone.classList.add("drag-over");
  });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault(); dropZone.classList.remove("drag-over");
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });

  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  clearBtn.addEventListener("click", resetUpload);

  function loadFile(file) {
    if (!file.type.startsWith("image/")) {
      showError(uploadError, "Please upload an image file (JPG, PNG, WebP…)");
      return;
    }
    selectedFile = file;
    const url = URL.createObjectURL(file);
    previewImg.src = url;
    previewWrap.style.display = "block";
    classifyBtn.disabled = false;
    clearError(uploadError);
    hideCard(cardResults);
    hideCard(cardAsk);
    hideCard(cardAnswer);
  }

  function resetUpload() {
    selectedFile = null;
    previewImg.src = "";
    previewWrap.style.display = "none";
    classifyBtn.disabled = true;
    fileInput.value = "";
    clearError(uploadError);
    hideCard(cardResults);
    hideCard(cardAsk);
    hideCard(cardAnswer);
  }

  // ── Classify ──────────────────────────────────────────────────────────────
  classifyBtn.addEventListener("click", async () => {
    if (!selectedFile) return;
    setLoading(classifyBtn, true, "Identifying…");
    clearError(uploadError);
    hideCard(cardResults);
    hideCard(cardAsk);
    hideCard(cardAnswer);

    try {
      const fd = new FormData();
      fd.append("file", selectedFile);

      const res = await fetch(`${CLASSIFIER_URL}/predict/`, { method: "POST", body: fd });
      if (!res.ok) throw new Error(`Server error ${res.status}`);

      const data = await res.json();
      renderPredictions(data.predictions);
      showCard(cardResults);
      cardResults.scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (err) {
      showError(uploadError, `Classification failed: ${err.message}`);
    } finally {
      setLoading(classifyBtn, false, "Identify Breed");
    }
  });

  // ── Render predictions ────────────────────────────────────────────────────
  function renderPredictions(preds) {
    predList.innerHTML = "";
    selectedBreed = null;
    selectBtn.disabled = true;

    preds.forEach((p, i) => {
      const pct = Math.round(p.probability * 100);
      const item = document.createElement("label");
      item.className = "pred-item";
      item.innerHTML = `
        <input type="radio" name="breed" value="${i}" />
        <div class="pred-rank">${i + 1}</div>
        <div class="pred-label-wrap">
          <div class="pred-name">${p.display_name}</div>
          <div class="pred-bar-wrap"><div class="pred-bar" style="width:${pct}%"></div></div>
        </div>
        <div class="pred-pct">${pct}%</div>
      `;
      item.addEventListener("click", () => {
        document.querySelectorAll(".pred-item").forEach(el => el.classList.remove("selected"));
        item.classList.add("selected");
        selectedBreed = p;
        selectBtn.disabled = false;
      });
      predList.appendChild(item);
    });
  }

  // ── Move to Q&A ───────────────────────────────────────────────────────────
  selectBtn.addEventListener("click", () => {
    if (!selectedBreed) return;
    qaBreedName.textContent = `🐾 ${selectedBreed.display_name}`;
    questionInput.value = "";
    askBtn.disabled = true;
    clearError(askError);
    hideCard(cardAnswer);
    showCard(cardAsk);
    cardAsk.scrollIntoView({ behavior: "smooth", block: "start" });
  });

  questionInput.addEventListener("input", () => {
    askBtn.disabled = questionInput.value.trim().length < 3;
  });

  // ── Ask ───────────────────────────────────────────────────────────────────
  askBtn.addEventListener("click", async () => {
    const question = questionInput.value.trim();
    if (!question || !selectedBreed) return;

    setLoading(askBtn, true, "Thinking…");
    clearError(askError);
    hideCard(cardAnswer);

    try {
      const res = await fetch(`${RAG_URL}/ask/`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          dog_breed: selectedBreed.breed,
          question: question,
        }),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);

      const data = await res.json();
      answerText.textContent = data.response;
      showCard(cardAnswer);
      cardAnswer.scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (err) {
      showError(askError, `Something went wrong: ${err.message}`);
    } finally {
      setLoading(askBtn, false, "Ask");
    }
  });

  // ── Post-answer actions ───────────────────────────────────────────────────
  askAnotherBtn.addEventListener("click", () => {
    hideCard(cardAnswer);
    questionInput.value = "";
    askBtn.disabled = true;
    questionInput.focus();
    cardAsk.scrollIntoView({ behavior: "smooth", block: "start" });
  });

  startOverBtn.addEventListener("click", () => {
    resetUpload();
    hideCard(cardResults);
    hideCard(cardAsk);
    hideCard(cardAnswer);
    window.scrollTo({ top: 0, behavior: "smooth" });
  });

  // ── Utilities ─────────────────────────────────────────────────────────────
  function showCard(el)  { el.classList.remove("hidden"); }
  function hideCard(el)  { el.classList.add("hidden"); }

  function setLoading(btn, loading, label) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="spinner"></span>${label}`
      : label;
  }

  function showError(el, msg) {
    el.innerHTML = `<div class="error-msg">⚠️ ${msg}</div>`;
  }
  function clearError(el) { el.innerHTML = ""; }
</script>
</body>
</html>
